{% extends 'base.html' %}

{% block title %}Correo Enviado{% endblock %}

{% block content %}

    <div class="stat-card">
        <h1 style="color: var(--primary-red); margin-bottom: 1rem;">Correo Enviado</h1>
        <p style="margin-bottom: 2rem;">Si existe una cuenta con el correo proporcionado, recibirá un mensaje con las instrucciones en breve.</p>

        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-secondary">Ir al Inicio</a>

    </div>
</div>
{% endblock %}
