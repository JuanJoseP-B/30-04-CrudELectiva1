{% extends 'base.html' %}

{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <h1 class="text-center">Restablecer Contraseña</h1>
    <p class="text-center" style="color: var(--text-muted); margin-bottom: 2rem;">Le enviaremos instrucciones por correo electrónico.</p>

    <form method="post" class="stat-card" style="text-align: left;">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Correo Electrónico</label>
            <input type="email" name="email" id="id_email" class="form-control" placeholder="nombre@ejemplo.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Enviar Enlace</button>
        <div class="text-center mt-4">
            <p style="font-size: 0.9rem;"><a href="{% url 'login' %}" style="color: var(--text-muted); text-decoration: none;">&larr; Volver al Inicio</a></p>
        </div>
    </form>
</div>
{% endblock %}
